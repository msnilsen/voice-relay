name: Build Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Standard Debug APK
        run: ./gradlew assembleStandardDebug

      - name: Get version info
        id: version
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d-%H%M)
          echo "tag=dev-${DATE}-${SHA}" >> $GITHUB_OUTPUT
          echo "name=Dev Build ${DATE} (${SHA})" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/standard/debug -name "*.apk" | head -1)
          cp "$APK" voice-relay-debug.apk

      - name: Create or update dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes 2>/dev/null || true
          git tag -f dev
          git push -f origin dev
          gh release create dev voice-relay-debug.apk \
            --title "${{ steps.version.outputs.name }}" \
            --notes "Automated debug build from \`main\` branch at commit ${{ github.sha }}.

          Install: download \`voice-relay-debug.apk\` below and sideload on Android." \
            --prerelease
